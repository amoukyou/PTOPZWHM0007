name: Daily Report Update

on:
  schedule:
    # 每个工作日3次采样：欧洲开盘前、午间、收盘后
    - cron: '0 7 * * 1-5'    # UTC 07:00 (北京15:00, 欧洲开盘前)
    - cron: '0 12 * * 1-5'   # UTC 12:00 (北京20:00, 欧洲午间)
    - cron: '30 18 * * 1-5'  # UTC 18:30 (北京02:30, 欧洲收盘后)
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: report-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy plotly

      - name: Generate report
        run: python3 hedge_final.py

      - name: Copy to docs
        run: |
          cp hedge_final.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hedge_final.html docs/index.html docs/prices.json docs/premium_history.json docs/premium.html PTOPZWHM0007_daily_*.csv
          git diff --cached --quiet || git commit -m "auto: update report $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase || true
          git push
