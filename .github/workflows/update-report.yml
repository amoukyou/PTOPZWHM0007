name: Daily Report Update

on:
  schedule:
    # 每个工作日3次采样，对齐西班牙交易时段整点
    # UTC 07 = CEST 09:00(夏) / CET 08:00(冬) — 开盘
    # UTC 11 = CEST 13:00(夏) / CET 12:00(冬) — 午间
    # UTC 14 = CEST 16:00(夏) / CET 15:00(冬) — 尾盘
    - cron: '0 7 * * 1-5'    # 西班牙开盘
    - cron: '0 11 * * 1-5'   # 西班牙午间
    - cron: '0 14 * * 1-5'   # 西班牙尾盘
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: report-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python3 hedge_final.py

      - name: Copy to docs
        run: |
          cp hedge_final.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hedge_final.html docs/index.html docs/prices.json docs/premium_history.json docs/premium.html PTOPZWHM0007_daily_*.csv
          git diff --cached --quiet || git commit -m "auto: update report $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase
          git push
