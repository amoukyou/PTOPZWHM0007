name: Daily Report Update

on:
  schedule:
    # 每天欧洲收盘后 UTC 18:30 (北京时间凌晨2:30) 运行
    - cron: '30 18 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy plotly

      - name: Generate report
        run: python3 hedge_final.py

      - name: Copy to docs
        run: cp hedge_final.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hedge_final.html docs/index.html
          git diff --cached --quiet || git commit -m "auto: update report $(date -u +%Y-%m-%d)"
          git push
