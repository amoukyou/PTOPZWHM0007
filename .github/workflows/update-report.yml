name: Daily Report Update

on:
  schedule:
    # 每个工作日整点采样，4小时间隔（覆盖欧洲开盘→收盘）
    - cron: '0 8 * * 1-5'    # UTC 08:00 (北京16:00, 欧洲开盘)
    - cron: '0 12 * * 1-5'   # UTC 12:00 (北京20:00, 欧洲午间)
    - cron: '0 16 * * 1-5'   # UTC 16:00 (北京00:00, 欧洲收盘)
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: report-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python3 hedge_final.py

      - name: Copy to docs
        run: |
          cp hedge_final.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hedge_final.html docs/index.html docs/prices.json docs/premium_history.json docs/premium.html PTOPZWHM0007_daily_*.csv
          git diff --cached --quiet || git commit -m "auto: update report $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase
          git push
